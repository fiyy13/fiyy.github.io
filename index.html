<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIYY — Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Syne', sans-serif; background: #030303;
  color: #d4d4d4; cursor: none; overflow-x: hidden; min-height: 100vh;
}
:root {
  --c: #00f0ff; --c2: #ff1744; --c3: #7c3aed;
  --bg: #030303; --bg2: #0d0d0d; --bg3: #141414;
  --txt: #d4d4d4; --dim: #525252; --bdr: rgba(255,255,255,0.055);
}

/* ═══════════════════════════════════════════
   ENTER SCREEN
═══════════════════════════════════════════ */
#enter-screen {
  position: fixed; inset: 0; z-index: 10000; background: #000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.6s ease, visibility 0.6s ease; cursor: pointer;
}
#enter-screen.gone { opacity: 0; visibility: hidden; pointer-events: none; }
.enter-text {
  font-family: 'Space Mono', monospace; font-size: 0.75rem;
  letter-spacing: 0.6em; text-transform: uppercase;
  color: var(--c); animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

/* ═══════════════════════════════════════════
   LOADER & CURSOR
═══════════════════════════════════════════ */
#loader {
  position: fixed; inset: 0; background: #000; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 28px; transition: opacity 0.9s ease, visibility 0.9s ease;
}
#loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }
.ld-name { font-family: 'Bebas Neue', sans-serif; font-size: 4.5rem; letter-spacing: 0.35em; color: #fff; }
.ld-bar-wrap { width: 220px; height: 1px; background: rgba(255,255,255,0.08); overflow: hidden; }
.ld-bar { height: 1px; background: var(--c); box-shadow: 0 0 12px var(--c); width: 0; animation: ld-fill 1.3s cubic-bezier(0.4,0,0.2,1) forwards 0.4s; }
@keyframes ld-fill { to { width: 100%; } }
.ld-txt { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--dim); }

#cur {
  width: 7px; height: 7px; background: var(--c); border-radius: 50%;
  position: fixed; z-index: 9990; pointer-events: none;
  box-shadow: 0 0 16px var(--c), 0 0 32px rgba(0,240,255,0.4);
  mix-blend-mode: screen; transition: transform 0.15s;
}
#cur-r {
  width: 30px; height: 30px; border: 1px solid rgba(0,240,255,0.35);
  border-radius: 50%; position: fixed; z-index: 9989; pointer-events: none;
  transition: transform 0.2s, border-color 0.2s;
}
body.hovering #cur { transform: scale(3.5); }
body.hovering #cur-r { transform: scale(1.6); border-color: rgba(0,240,255,0.7); }

/* ═══════════════════════════════════════════
   VIDEO BACKGROUND (PARALLAX ENABLED)
═══════════════════════════════════════════ */
#vbg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000;
  transform: scale(1.05); /* Scaled slightly to hide edges during parallax */
  transition: transform 0.15s ease-out; /* Smooth follow */
}
#vbg video {
  width: 100%; height: 100%; object-fit: cover; opacity: 0.35;
  filter: saturate(1) brightness(0.8);
}
#vbg::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%);
}

/* ═══════════════════════════════════════════
   OVERLAYS (VHS NOISE & SCANLINES)
═══════════════════════════════════════════ */
/* FEATURE #4: VHS GRAIN NOISE */
.noise {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.05;
  background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
}
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
}
.vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%); }

/* ═══════════════════════════════════════════
   MAIN UI & HERO
═══════════════════════════════════════════ */
.wrap { position: relative; z-index: 10; }
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px; backdrop-filter: blur(24px); background: rgba(3,3,3,0.6);
  border-bottom: 1px solid var(--bdr);
}
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.75rem; letter-spacing: 0.12em; color: var(--c); text-shadow: 0 0 24px rgba(0,240,255,0.5); }
.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a { color: var(--dim); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--txt); }

.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 24px; position: relative; }
.glitch { font-family: 'Bebas Neue', sans-serif; font-size: clamp(110px, 18vw, 270px); line-height: 0.85; color: #fff; position: relative; letter-spacing: -0.01em; user-select: none; }
.glitch::before, .glitch::after { content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
.glitch::before { color: var(--c); animation: gx1 5s infinite; clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%); opacity: 0.75; }
.glitch::after { color: var(--c2); animation: gx2 5s infinite; clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%); opacity: 0.75; }
@keyframes gx1 { 0%, 88%, 100% { transform: none; } 90% { transform: translate(-5px, 1px) skewX(-1deg); } 92% { transform: translate(5px, -2px) skewX(1deg); } 94% { transform: translate(-2px, 1px); } }
@keyframes gx2 { 0%, 85%, 100% { transform: none; } 87% { transform: translate(5px, -1px) skewX(1deg); } 89% { transform: translate(-4px, 2px) skewX(-1deg); } 92% { transform: translate(2px, -1px); } }
.hero-tagline { font-family: 'Space Mono', monospace; font-size: clamp(0.62rem, 1.2vw, 0.78rem); letter-spacing: 0.45em; text-transform: uppercase; color: var(--dim); margin-top: 20px; }
.hero-tagline .ac { color: var(--c); }
.hero-time { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--dim); margin-bottom: 20px; }
.hero-time .ac { color: var(--c); font-weight: 700; }

/* ═══════════════════════════════════════════
   PORTFOLIO & SECTIONS
═══════════════════════════════════════════ */
.sec { padding: 100px 48px; max-width: 1440px; margin: 0 auto; }
.sec-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--c); margin-bottom: 10px; }
.sec-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 6vw, 5.5rem); line-height: 0.88; letter-spacing: 0.02em; color: #fff; margin-bottom: 60px; }
.hr { width: 100%; height: 1px; background: var(--bdr); max-width: 1440px; margin: 0 auto; }
.rv { opacity: 0; transform: translateY(36px); transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1), transform 0.85s cubic-bezier(0.16,1,0.3,1); }
.rv.in { opacity: 1; transform: none; }

.ptabs { display: flex; gap: 0; border-bottom: 1px solid var(--bdr); margin-bottom: 1px; }
.ptab { padding: 16px 36px; background: none; border: none; font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); cursor: pointer; position: relative; transition: color 0.2s; }
.ptab::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--c); transform: scaleX(0); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
.ptab:hover, .ptab.on { color: #fff; }
.ptab.on::after { transform: scaleX(1); }
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--bdr); border: 1px solid var(--bdr); }
.pi { position: relative; aspect-ratio: 16/10; overflow: hidden; background: var(--bg2); cursor: pointer; }
.pi img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.16,1,0.3,1), filter 0.4s; filter: saturate(0.6) brightness(0.85); }
.pi:hover img { transform: scale(1.06); filter: saturate(1) brightness(1); }
.pi-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0) 55%); display: flex; align-items: flex-end; padding: 24px; opacity: 0; transition: opacity 0.3s; }
.pi:hover .pi-ov { opacity: 1; }
.pi-title { font-weight: 800; font-size: 0.95rem; color: #fff; }
.pi-desc { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-top: 3px; }

/* ═══════════════════════════════════════════
   CONTACT & SUCCESS GLOW
═══════════════════════════════════════════ */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--bdr); border: 1px solid var(--bdr); }
.c-link { display: flex; align-items: center; gap: 22px; padding: 30px 36px; background: var(--bg); text-decoration: none; color: var(--txt); cursor: pointer; transition: background 0.2s, box-shadow 0.3s ease, border-color 0.3s ease; border: none; text-align: left; width: 100%; font-family: 'Syne', sans-serif; position: relative; border: 1px solid transparent; }
.c-link:hover { background: var(--bg2); }
.c-icon { width: 52px; height: 52px; background: var(--bg3); border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
.c-name { font-weight: 800; font-size: 1rem; color: #fff; }
.c-detail { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--dim); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.c-arr { margin-left: auto; color: var(--dim); font-size: 1.4rem; transition: color 0.2s, transform 0.2s; }
.c-link:hover .c-arr { color: var(--c); transform: translate(3px,-3px); }

/* FEATURE #1: SUCCESS GLOW ANIMATIONS */
.c-link.glow-paypal { background: rgba(0, 112, 186, 0.15) !important; box-shadow: inset 0 0 20px rgba(0, 112, 186, 0.4); border-color: rgba(0, 112, 186, 0.8); }
.c-link.glow-tng { background: rgba(0, 153, 255, 0.18) !important; box-shadow: inset 0 0 20px rgba(0, 153, 255, 0.4); border-color: rgba(0, 153, 255, 0.8); }
.c-link.glow-discord { background: rgba(88, 101, 242, 0.15) !important; box-shadow: inset 0 0 20px rgba(88, 101, 242, 0.4); border-color: rgba(88, 101, 242, 0.8); }

/* FEATURE #9: LANYARD DOT */
.ds-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); box-shadow: 0 0 8px currentColor; transition: background 0.5s, box-shadow 0.5s; }

/* ═══════════════════════════════════════════
   MUSIC PLAYER & MARQUEE
═══════════════════════════════════════════ */
#mp { position: fixed; bottom: 28px; left: 28px; z-index: 200; display: flex; align-items: center; gap: 14px; padding: 13px 22px; background: rgba(3,3,3,0.88); border: 1px solid var(--bdr); backdrop-filter: blur(24px); cursor: pointer; user-select: none; transition: border-color 0.3s; }
#mp:hover { border-color: rgba(0,240,255,0.35); }
.mp-bars { display: flex; align-items: flex-end; gap: 2.5px; height: 16px; }
.mp-bar { width: 3px; background: var(--c); box-shadow: 0 0 6px var(--c); border-radius: 2px; transform-origin: bottom; animation: bar 0.9s ease-in-out infinite; }
.mp-bar:nth-child(1) { height: 9px; animation-delay: 0s; } .mp-bar:nth-child(2) { height: 15px; animation-delay: 0.18s; } .mp-bar:nth-child(3) { height: 7px; animation-delay: 0.36s; } .mp-bar:nth-child(4) { height: 13px; animation-delay: 0.54s; } .mp-bar:nth-child(5) { height: 10px; animation-delay: 0.27s; }
@keyframes bar { 0%,100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }
.mp-bars.paused .mp-bar { animation-play-state: paused; transform: scaleY(0.25); }

/* FEATURE #2: AUDIO MARQUEE */
.mp-info-wrap { width: 140px; overflow: hidden; position: relative; }
.mp-info { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt); font-weight: 400; display: inline-block; white-space: nowrap; }
.marquee-active { animation: marquee-scroll 6s linear infinite; }
@keyframes marquee-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

.mp-vol { display: flex; align-items: center; gap: 8px; }
.mp-vol-icon { font-size: 0.7rem; color: var(--dim); }
input[type=range].mp-slider { -webkit-appearance: none; width: 70px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
input[type=range].mp-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--c); box-shadow: 0 0 6px var(--c); cursor: pointer; }

#toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--c); color: #000; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; padding: 10px 28px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 400; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
footer { padding: 36px 48px; border-top: 1px solid var(--bdr); display: flex; align-items: center; justify-content: space-between; margin-top: 50px;}
.f-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.15em; color: rgba(255,255,255,0.1); }
.f-copy { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
</style>
</head>

const volEl = document.getElementById('mp-vol');

  initCursor(); initClock(); initHero(); buildPortfolio('building'); buildContact(); initReveal();
  volEl.addEventListener('input', () => audio.volume = volEl.value);
  audio.addEventListener('ended', () => {
    trackIdx = (trackIdx + 1) % CONFIG.music.length;
    audio.src = CONFIG.music[trackIdx].file;
    if (isPlaying) audio.play().catch(() => {});
  });
  fetchLanyard(); // Fetch real-time Discord Status
  setInterval(fetchLanyard, 15000); // Update every 15s
});

function startSite() {
  document.getElementById('enter-screen').classList.add('gone');
  const v = document.getElementById('bg-vid');
  if (CONFIG.bgVideo) { v.src = CONFIG.bgVideo; v.play().catch(()=>{}); }
  
  if (CONFIG.music.length) {
    audio.src = CONFIG.music[0].file; audio.volume = volEl.value;
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('mp-bars').classList.remove('paused');
      const titleEl = document.getElementById('mp-title');
      titleEl.textContent = CONFIG.music[0].title;
      titleEl.classList.add('marquee-active'); // Add marquee
    }).catch(()=>{});
  }
  setTimeout(() => document.getElementById('loader').classList.add('gone'), 1600);
}

function toggleMusic() {
  const bars = document.getElementById('mp-bars'), titleEl = document.getElementById('mp-title');
  if (isPlaying) {
    audio.pause(); bars.classList.add('paused'); titleEl.classList.remove('marquee-active');
    isPlaying = false;
  } else {
    audio.play().then(() => {
      bars.classList.remove('paused'); titleEl.classList.add('marquee-active');
      titleEl.textContent = CONFIG.music[trackIdx].title;
      isPlaying = true;
    }).catch(()=>{});
  }
}

// FEATURE #6: PARALLAX VIDEO MOUSE EVENT
function initCursor() {
  const dot = document.getElementById('cur'), ring = document.getElementById('cur-r'), vbg = document.getElementById('vbg');
  let rx = 0, ry = 0, mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = (mx - 3.5) + 'px'; dot.style.top = (my - 3.5) + 'px';
    
    // Parallax logic
    const xOffset = (mx / window.innerWidth - 0.5) * 20; 
    const yOffset = (my / window.innerHeight - 0.5) * 20;
    vbg.style.transform = `scale(1.05) translate(${-xOffset}px, ${-yOffset}px)`;
  });
  (function animRing() {
    rx += (mx - rx - 15) * 0.14; ry += (my - ry - 15) * 0.14;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  })();
}

function initClock() {
  setInterval(() => {
    document.getElementById('hero-time').innerHTML = `● KL, MY — <span class="ac">${new Date().toLocaleTimeString('en-US', { timeZone:'Asia/Kuala_Lumpur', hour12:true, hour:'numeric', minute:'2-digit' })}</span>`;
  }, 1000);
}

function initHero() {
  document.getElementById('hero-name').textContent = document.getElementById('hero-name').dataset.text = CONFIG.name;
  document.getElementById('hero-tag').innerHTML = CONFIG.tagline;
}

function switchTab(btn, tab) {
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); buildPortfolio(tab);
}

function buildPortfolio(tab) {
  const items = CONFIG.portfolio[tab] || [], grid = document.getElementById('pgrid');
  grid.innerHTML = items.map(item => `<div class="pi rv"><img src="${item.image}" onerror="this.style.display='none'"><div class="pi-ov"><div><div class="pi-title">${item.title}</div><div class="pi-desc">${item.description}</div></div></div></div>`).join('');
  setTimeout(initReveal, 50);
}

// FEATURE #1: SUCCESS GLOW FUNCTION
function handleCopy(el, text, msg, type) {
  navigator.clipboard.writeText(text).catch(() => {});
  const t = document.getElementById('toast');
  t.textContent = msg || 'Copied!'; t.classList.add('show');
  
  // Add specific glow class based on type
  el.classList.add('glow-' + type);
  setTimeout(() => {
    t.classList.remove('show');
    el.classList.remove('glow-' + type);
  }, 1500);
}

function buildContact() {
  document.getElementById('contact-grid').innerHTML = CONFIG.contact.map((c, i) => `
    <button class="c-link rv" style="transition-delay:${i*0.08}s;background:${c.bg}" onclick="${c.action === 'copy' ? `handleCopy(this, '${c.url}', '${c.name} Copied!', '${c.type}')` : `window.open('${c.url}','_blank')`}">
      <div class="c-icon">${c.icon}</div>
      <div>
        <div class="c-name">${c.name}</div>
        <div class="c-detail" id="detail-${c.type}">
          ${c.type === 'discord' ? '<div class="ds-dot" id="ds-dot"></div>' : ''}
          <span id="text-${c.type}">${c.baseDetail}</span>
        </div>
      </div>
      <div class="c-arr">${c.action === 'copy' ? '📋' : '↗'}</div>
    </button>`).join('');
}

// FEATURE #9: REAL-TIME LANYARD API
async function fetchLanyard() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.discordId}`);
    const { data } = await res.json();
    const txtEl = document.getElementById('text-discord');
    const dotEl = document.getElementById('ds-dot');
    if(!txtEl || !data) return;

    let statusText = "Offline";
    let dotColor = "var(--dim)";

    if (data.discord_status !== "offline") {
      statusText = "Online"; dotColor = "#23a55a"; // Green
      if (data.discord_status === "dnd") dotColor = "#f23f43";
      if (data.discord_status === "idle") dotColor = "#f0b232";
      
      // Check if playing something (like Roblox Studio)
      if (data.activities && data.activities.length > 0) {
        statusText = `Playing ${data.activities[0].name}`;
      }
    }
    txtEl.textContent = statusText;
    dotEl.style.color = dotColor;
    dotEl.style.backgroundColor = dotColor;
    dotEl.style.boxShadow = `0 0 8px ${dotColor}`;
  } catch(e) { console.log("Lanyard sync failed."); }
}

function initReveal() {
  const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); } }); }, { threshold: 0.08 });
  document.querySelectorAll('.rv:not(.in)').forEach(el => obs.observe(el));
}
</script>
