<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIYY — Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   BASE RESET & VARS
═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Syne', sans-serif;
  background: #030303;
  color: #d4d4d4;
  cursor: none;
  overflow-x: hidden;
  min-height: 100vh;
}
:root {
  --c: #00f0ff; --c2: #ff1744; --bg: #030303; --bg2: #0d0d0d;
  --txt: #d4d4d4; --dim: #525252; --bdr: rgba(255,255,255,0.08);
}

/* ═══════════════════════════════════════════
   GUNS.LOL ENTER SCREEN
═══════════════════════════════════════════ */
#enter-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity 0.8s ease, visibility 0.8s;
}
#enter-screen.gone { opacity: 0; visibility: hidden; pointer-events: none; }
.enter-txt {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.6em;
  color: var(--c); text-transform: uppercase;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

/* ═══════════════════════════════════════════
   VIDEO BACKGROUND (HIGH VISIBILITY)
═══════════════════════════════════════════ */
#vbg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: #000; }
#vbg video {
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0.45; /* High visibility */
  filter: saturate(1.1) brightness(0.8);
}
.vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%); }

/* ═══════════════════════════════════════════
   INTERFACE LAYOUT
═══════════════════════════════════════════ */
.wrap { position: relative; z-index: 10; opacity: 0; transition: opacity 1s ease; }
.wrap.visible { opacity: 1; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px; backdrop-filter: blur(10px); background: rgba(3,3,3,0.4);
  border-bottom: 1px solid var(--bdr);
}
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--c); }
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a { color: var(--dim); text-decoration: none; font-family: 'Space Mono'; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; transition: 0.3s; }
.nav-links a:hover { color: #fff; }

.hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.glitch { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 15vw, 220px); color: #fff; position: relative; }
.hero-tagline { font-family: 'Space Mono'; font-size: 0.7rem; color: var(--dim); margin-top: 15px; letter-spacing: 0.3em; }
.ac { color: var(--c); }

/* ═══════════════════════════════════════════
   MUSIC PLAYER
═══════════════════════════════════════════ */
#mp {
  position: fixed; bottom: 30px; left: 30px; z-index: 200;
  display: flex; align-items: center; gap: 15px;
  padding: 12px 20px; background: rgba(0,0,0,0.7);
  border: 1px solid var(--bdr); backdrop-filter: blur(15px);
  cursor: pointer; border-radius: 4px;
}
.mp-bars { display: flex; align-items: flex-end; gap: 3px; height: 14px; }
.mp-bar { width: 3px; background: var(--c); animation: bar 1s infinite; transform-origin: bottom; }
@keyframes bar { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
.paused .mp-bar { animation-play-state: paused; transform: scaleY(0.3); }
.mp-info { font-family: 'Space Mono'; font-size: 0.55rem; color: #fff; text-transform: uppercase; }

/* ═══════════════════════════════════════════
   CONTENT CARDS
═══════════════════════════════════════════ */
.sec { padding: 80px 48px; max-width: 1200px; margin: 0 auto; }
.pgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
.pi { 
  background: rgba(255,255,255,0.03); border: 1px solid var(--bdr); 
  aspect-ratio: 16/9; overflow: hidden; position: relative; backdrop-filter: blur(5px);
}
.pi img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.8; }
.pi:hover img { transform: scale(1.05); opacity: 1; }

#cur { width: 6px; height: 6px; background: var(--c); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
#cur-r { width: 30px; height: 30px; border: 1px solid var(--c); opacity: 0.3; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; }

.rv { opacity: 0; transform: translateY(20px); transition: 0.8s; }
.rv.in { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="enter-screen" onclick="startPortfolio()">
  <div class="enter-txt">[ Click to Enter ]</div>
</div>

<div id="cur"></div><div id="cur-r"></div>

<div id="vbg">
  <video id="bg-vid" loop muted playsinline preload="auto"></video>
  <div class="vignette"></div>
</div>

<div id="mp" onclick="toggleMusic()">
  <div class="mp-bars paused" id="mp-bars">
    <div class="mp-bar"></div><div class="mp-bar"></div><div class="mp-bar"></div><div class="mp-bar"></div>
  </div>
  <div class="mp-info" id="mp-title">Muted</div>
</div>
<audio id="bg-audio" loop preload="auto"></audio>

<div class="wrap" id="main-wrap">
  <nav>
    <div class="nav-logo">FIYY</div>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#portfolio">Work</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-time rv" id="hero-time">● KL, MY — 00:00 AM</div>
    <div class="glitch rv" id="hero-name">FIYY</div>
    <div class="hero-tagline rv" id="hero-tag"></div>
  </section>

  <section class="sec" id="portfolio">
    <h2 style="font-family:'Bebas Neue'; font-size: 3rem;">Selected Projects</h2>
    <div class="pgrid" id="pgrid"></div>
  </section>

  <footer style="padding: 100px; text-align: center; font-family: 'Space Mono'; font-size: 0.6rem; color: var(--dim);">
    © 2026 FIYY — ALL RIGHTS RESERVED
  </footer>
</div>

<script>
const CONFIG = {
  name: "FIYY",
  tagline: `<span class="ac">Roblox Dev</span> &mdash; Web Builder &mdash; <span class="ac">Commission Open</span>`,
  bgVideo: "bg.mp4",
  music: "music.mp3",
  musicTitle: "Lost Soul — NBSPLV",
  portfolio: [
    { title: "MCOnet Project", desc: "Monaco Environment", img: "portfolio/building/monaco.webp" },
    { title: "Car Dealership", desc: "Advanced UI System", img: "portfolio/scripting/dealer.webp" }
  ]
};

let isPlaying = false;
const audio = document.getElementById('bg-audio');
const video = document.getElementById('bg-vid');

// THE "ENTER" TRICK
function startPortfolio() {
  // Hide Enter Screen
  document.getElementById('enter-screen').classList.add('gone');
  document.getElementById('main-wrap').classList.add('visible');
  
  // Start Video (Now allowed because of the click)
  video.src = CONFIG.bgVideo;
  video.play();
  
  // Start Music (Now allowed because of the click)
  audio.src = CONFIG.music;
  audio.volume = 0.4;
  toggleMusic();
  
  // Init other parts
  initCursor();
  initClock();
  initHero();
  buildPortfolio();
  initReveal();
}

function toggleMusic() {
  const bars = document.getElementById('mp-bars');
  const title = document.getElementById('mp-title');
  if (isPlaying) {
    audio.pause();
    bars.classList.add('paused');
    title.textContent = "Paused";
    isPlaying = false;
  } else {
    audio.play();
    bars.classList.remove('paused');
    title.textContent = CONFIG.musicTitle;
    isPlaying = true;
  }
}

function initCursor() {
  const dot = document.getElementById('cur'), ring = document.getElementById('cur-r');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.transform = `translate(${mx - 3}px, ${my - 3}px)`;
  });
  function anim() {
    rx += (mx - rx - 15) * 0.12; ry += (my - ry - 15) * 0.12;
    ring.style.transform = `translate(${rx}px, ${ry}px)`;
    requestAnimationFrame(anim);
  }
  anim();
}

function initClock() {
  setInterval(() => {
    const t = new Date().toLocaleTimeString('en-US', { timeZone:'Asia/Kuala_Lumpur', hour:'numeric', minute:'2-digit' });
    document.getElementById('hero-time').innerHTML = `● KL, MY — <span class="ac">${t}</span>`;
  }, 1000);
}

function initHero() {
  document.getElementById('hero-name').textContent = CONFIG.name;
  document.getElementById('hero-tag').innerHTML = CONFIG.tagline;
}

function buildPortfolio() {
  document.getElementById('pgrid').innerHTML = CONFIG.portfolio.map(p => `
    <div class="pi rv">
      <img src="${p.img}" onerror="this.style.display='none'">
      <div style="position:absolute; bottom:20px; left:20px; z-index:5;">
        <div style="font-family:'Bebas Neue'; font-size:1.5rem; color:#fff;">${p.title}</div>
        <div style="font-family:'Space Mono'; font-size:0.6rem; color:var(--c);">${p.desc}</div>
      </div>
    </div>`).join('');
}

function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.rv').forEach(el => obs.observe(el));
}
</script>
</body>
</html>
