<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review — FIYY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

:root {
  --c:   #00f0ff;
  --c2:  #ff1744;
  --bg:  #030303;
  --bg2: #0d0d0d;
  --txt: #d4d4d4;
  --dim: #525252;
  --bdr: rgba(255,255,255,0.055);
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

#cur {
  width: 7px; height: 7px;
  background: var(--c); border-radius: 50%;
  position: fixed; z-index: 9990; pointer-events: none;
  box-shadow: 0 0 16px var(--c), 0 0 32px rgba(0,240,255,0.4);
  mix-blend-mode: screen; transition: transform 0.15s;
}
#cur-r {
  width: 30px; height: 30px;
  border: 1px solid rgba(0,240,255,0.35); border-radius: 50%;
  position: fixed; z-index: 9989; pointer-events: none;
  transition: transform 0.2s, border-color 0.2s;
}
body.hovering #cur { transform: scale(3.5); }
body.hovering #cur-r { transform: scale(1.6); border-color: rgba(0,240,255,0.7); }

.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0,240,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 85% 30%, rgba(124,58,237,0.03) 0%, transparent 70%);
}
.scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
}
.ticker {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 1px; overflow: hidden;
}
.ticker::after {
  content: ''; position: absolute; top: 0; left: -30%; width: 30%; height: 1px;
  background: linear-gradient(to right, transparent, var(--c), transparent);
  animation: tick-slide 3s ease-in-out infinite;
}
@keyframes tick-slide { to { left: 130%; } }

.card {
  position: relative; z-index: 10;
  width: 100%; max-width: 520px;
  background: var(--bg);
  border: 1px solid var(--bdr);
}

.card-header {
  padding: 36px 40px 28px;
  border-bottom: 1px solid var(--bdr);
  text-align: center;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; letter-spacing: 0.15em;
  color: var(--c);
  text-shadow: 0 0 36px rgba(0,240,255,0.4);
  display: block; margin-bottom: 6px;
}
.card-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.4em;
  text-transform: uppercase; color: var(--dim);
}

.form-body { padding: 32px 40px; }

.form-group { margin-bottom: 22px; }

.form-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--c);
  display: block; margin-bottom: 10px;
}

.form-input {
  width: 100%; background: var(--bg2);
  border: 1px solid var(--bdr);
  color: var(--txt); padding: 13px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem; transition: border-color 0.2s;
}
.form-input::placeholder { color: var(--dim); font-size: 0.85rem; }
.form-input:focus {
  outline: none; border-color: var(--c);
  box-shadow: 0 0 14px rgba(0,240,255,0.1);
}
.form-textarea {
  min-height: 110px; resize: vertical;
  font-family: 'Syne', sans-serif;
}

.char-count {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem; letter-spacing: 0.2em;
  color: var(--dim); text-align: right;
  margin-top: 6px; transition: color 0.2s;
}
.char-count.warn { color: var(--c2); }

.rating-row {
  display: flex; align-items: center; gap: 4px;
  margin-top: 8px;
}
.star-btn {
  background: none; border: none;
  font-size: 2rem; cursor: pointer;
  filter: grayscale(1) opacity(0.35);
  transition: filter 0.15s, transform 0.15s;
  line-height: 1; padding: 2px;
}
.star-btn.active { filter: grayscale(0) opacity(1); transform: scale(1.1); }
.star-btn.hovered { filter: grayscale(0) opacity(1); }
.rating-text {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem; letter-spacing: 0.2em;
  color: var(--dim); margin-left: 8px;
}
.rating-text.filled { color: #fbbf24; }

.submit-btn {
  width: 100%; background: var(--c); color: #000;
  border: none; padding: 15px;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.4em;
  text-transform: uppercase; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 0 24px rgba(0,240,255,0.2);
  margin-top: 8px;
}
.submit-btn:hover { box-shadow: 0 0 40px rgba(0,240,255,0.45); transform: translateY(-2px); }
.submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

.success-screen {
  display: none;
  padding: 60px 40px;
  text-align: center;
}
.success-screen.show { display: block; }
.success-icon { font-size: 3rem; margin-bottom: 20px; }
.success-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem; letter-spacing: 0.1em;
  color: #10b981; margin-bottom: 8px;
}
.success-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--dim);
  line-height: 1.8;
}
.btn-another {
  margin-top: 28px;
  background: none; border: 1px solid var(--bdr);
  color: var(--dim); padding: 11px 28px;
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem; letter-spacing: 0.28em;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; display: inline-block;
}
.btn-another:hover { border-color: var(--c); color: var(--c); }

.card-footer {
  padding: 16px 40px;
  border-top: 1px solid var(--bdr);
  text-align: center;
}
.card-footer-txt {
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--dim);
}
.card-footer-txt a {
  color: var(--dim); text-decoration: none; transition: color 0.2s;
}
.card-footer-txt a:hover { color: var(--c); }

#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--c); color: #000;
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase;
  padding: 10px 24px; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; z-index: 500;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 560px) {
  body { cursor: default; padding: 0; align-items: stretch; }
  #cur, #cur-r { display: none; }
  .card { max-width: 100%; border-left: none; border-right: none; border-top: none; }
  .card-header, .form-body, .card-footer { padding-left: 24px; padding-right: 24px; }
  .success-screen { padding: 48px 24px; }
  .star-btn { font-size: 1.7rem; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>
<div class="ticker"></div>
<div class="bg-glow"></div>
<div class="scanlines"></div>
<div id="toast"></div>

<div class="card">

  <div class="card-header">
    <span class="logo">FIYY</span>
    <div class="card-subtitle">Leave a Review</div>
  </div>

  <div id="form-section">
    <div class="form-body">
      <form id="feedback-form">

        <div class="form-group">
          <label class="form-label">Your Name / Roblox Username</label>
          <input type="text" class="form-input" id="name-input" required maxlength="50" placeholder="e.g. xXPlayerXx" autocomplete="off">
        </div>

        <div class="form-group">
          <label class="form-label">Rating</label>
          <div class="rating-row">
            <button type="button" class="star-btn" data-rating="1">⭐</button>
            <button type="button" class="star-btn" data-rating="2">⭐</button>
            <button type="button" class="star-btn" data-rating="3">⭐</button>
            <button type="button" class="star-btn" data-rating="4">⭐</button>
            <button type="button" class="star-btn" data-rating="5">⭐</button>
            <span class="rating-text" id="rating-text">Select rating</span>
          </div>
          <input type="hidden" id="rating-value">
        </div>

        <div class="form-group">
          <label class="form-label">Your Feedback</label>
          <textarea class="form-input form-textarea" id="feedback-input" required maxlength="500" placeholder="Tell others about your experience working with FIYY..."></textarea>
          <div class="char-count" id="char-count">0 / 500</div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Submit Review</button>
      </form>
    </div>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">🔥</div>
    <div class="success-title">Received!</div>
    <div class="success-sub">Thanks for the review.<br>It means a lot!</div>
    <button class="btn-another" onclick="resetForm()">Submit another</button>
  </div>

  <div class="card-footer">
    <div class="card-footer-txt"><a href="index.html">← Back to portfolio</a></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  const app = initializeApp({
    apiKey: "AIzaSyDMKcvkIPuqYrY0VNYWlk7hTbWsM9oI0Qk",
    authDomain: "fiyy13-portfolio.firebaseapp.com",
    projectId: "fiyy13-portfolio",
    storageBucket: "fiyy13-portfolio.appspot.com",
    messagingSenderId: "1090998456947",
    appId: "1:1090998456947:web:07dd09967558268dca1006"
  });
  window.db = getFirestore(app);
</script>

<script>
const dot = document.getElementById('cur'), ring = document.getElementById('cur-r');
let rx = 0, ry = 0, mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = (mx - 3.5) + 'px'; dot.style.top = (my - 3.5) + 'px';
});
(function animRing() {
  rx += (mx - rx - 15) * 0.14; ry += (my - ry - 15) * 0.14;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
})();
document.addEventListener('mouseover', e => {
  document.body.classList.toggle('hovering', !!e.target.closest('a, button, input, textarea'));
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

let selectedRating = 0;
const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Great', 'Excellent! 🔥'];
const stars = document.querySelectorAll('.star-btn');
const ratingText = document.getElementById('rating-text');

stars.forEach(btn => {
  const r = parseInt(btn.dataset.rating);
  btn.addEventListener('mouseenter', () => stars.forEach((s, i) => s.classList.toggle('hovered', i < r)));
  btn.addEventListener('mouseleave', () => stars.forEach(s => s.classList.remove('hovered')));
  btn.addEventListener('click', () => {
    selectedRating = r;
    document.getElementById('rating-value').value = r;
    ratingText.textContent = ratingLabels[r];
    ratingText.classList.add('filled');
    stars.forEach((s, i) => s.classList.toggle('active', i < r));
  });
});

document.getElementById('feedback-input').addEventListener('input', function () {
  const len = this.value.length;
  const el = document.getElementById('char-count');
  el.textContent = `${len} / 500`;
  el.classList.toggle('warn', len > 450);
});

document.getElementById('feedback-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (selectedRating === 0) { showToast('Please select a rating!'); return; }

  const nameVal = document.getElementById('name-input').value.trim();
  const feedbackVal = document.getElementById('feedback-input').value.trim();
  
  if (!nameVal || !feedbackVal) {
    showToast('Please fill all fields!');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const { addDoc, collection, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
    await addDoc(collection(window.db, 'reviews'), {
      name: nameVal,
      rating: selectedRating,
      feedback: feedbackVal,
      timestamp: serverTimestamp()
    });
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
  } catch (err) {
    console.error(err);
    showToast('Failed to submit. Try again!');
    btn.disabled = false;
    btn.textContent = 'Submit Review';
  }
});

function resetForm() {
  document.getElementById('feedback-form').reset();
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('success-screen').classList.remove('show');
  selectedRating = 0;
  ratingText.textContent = 'Select rating';
  ratingText.classList.remove('filled');
  stars.forEach(s => s.classList.remove('active'));
  document.getElementById('char-count').textContent = '0 / 500';
  const btn = document.getElementById('submit-btn');
  btn.disabled = false; btn.textContent = 'Submit Review';
}
</script>
</body>
</html>
